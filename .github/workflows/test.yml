name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        run: pip install -e ".[dev]"

      - name: Check version consistency
        run: |
          PYPROJECT_VER=$(python -c "import sys; f=open('pyproject.toml','rb'); print((__import__('tomllib') if sys.version_info>=(3,11) else __import__('tomli')).load(f)['project']['version'])")
          INIT_VER=$(python -c "from coordinationhub import __version__; print(__version__)")
          if [ "$PYPROJECT_VER" != "$INIT_VER" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VER, __init__.py=$INIT_VER"
            exit 1
          fi
          echo "Version consistent: $PYPROJECT_VER"

      - name: Check doc generation is up to date
        run: python scripts/gen_docs.py --check

      - name: Run tests
        run: python -m pytest tests/ -q --tb=short
