name: Create GitHub Release (on version tag)

on:
  push:
    tags:
      - 'v*'

# Zero third-party actions. Uses only:
# - Pre-installed tools on ubuntu-latest (git, gh CLI, python, curl)
# - `build` from PyPA (installed at runtime)
#
# This workflow:
# 1. Builds sdist + wheel for the tag
# 2. Creates a proper GitHub Release (this fires the "release: published" event)
# 3. Attaches the built artifacts as release assets
# 4. The existing publish.yml then handles PyPI via OIDC Trusted Publishing (no secrets)
#
# Security model:
# - No long-lived PyPI API tokens anywhere
# - PyPI publish uses short-lived tokens minted from GitHub OIDC (see publish.yml)
# - Only tags matching v* trigger releases

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to create the release and upload assets
      id-token: write          # not strictly needed here, but harmless

    steps:
      - name: Checkout at the exact tag
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          git init -q
          git config --global --add safe.directory "$PWD"
          git remote add origin "https://github.com/${REPO}.git"
          git -c protocol.version=2 fetch --depth=1 origin "refs/tags/${TAG}"
          git checkout --force FETCH_HEAD

      - name: Select Python 3.12 from tool cache
        run: |
          set -euo pipefail
          PY_DIR=$(ls -d /opt/hostedtoolcache/Python/3.12.*/x64 2>/dev/null | sort -V | tail -1)
          if [ -z "$PY_DIR" ] || [ ! -x "$PY_DIR/bin/python" ]; then
            echo "::error::Python 3.12 not found in tool cache"
            exit 1
          fi
          echo "$PY_DIR/bin" >> "$GITHUB_PATH"
          "$PY_DIR/bin/python" --version

      - name: Build sdist and wheel
        run: |
          set -euo pipefail
          pip install --disable-pip-version-check build
          python -m build
          ls -lh dist/

      - name: Create GitHub Release + attach artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Generate a clean release title and notes
          TITLE="${TAG} — $(git log -1 --pretty=%s || echo 'Release')"

          # Create the release (this is what triggers publish.yml via "release: published")
          # --generate-notes pulls the commits since the previous tag
          gh release create "${TAG}" \
            --repo "${REPO}" \
            --title "${TITLE}" \
            --generate-notes \
            --verify-tag \
            dist/*.tar.gz \
            dist/*.whl

          echo "Created GitHub Release ${TAG} with attached artifacts."
          gh release view "${TAG}" --repo "${REPO}" --json assets --jq '.assets[].name'
